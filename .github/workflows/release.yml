name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5.0.5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Source and tag preflight
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-rc\.(0|[1-9][0-9]*))?$ ]]
          tag_ref="refs/tags/$GITHUB_REF_NAME"
          test "$(git cat-file -t "$tag_ref")" = tag
          test "$(git rev-parse "$tag_ref^{commit}")" = "$(git rev-parse HEAD)"
          expected_fingerprint=D5FE09FFAB4DC62CBD1409AE4270AC427A84CCC1
          actual_fingerprint=$(gpg --batch --with-colons --show-keys \
            .github/release-signing-key.asc | awk -F: '$1=="fpr" {print toupper($10); exit}')
          test "$actual_fingerprint" = "$expected_fingerprint"
          export GNUPGHOME="$RUNNER_TEMP/release-tag-gnupg"
          install -d -m 700 "$GNUPGHOME"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          gpg --batch --import .github/release-signing-key.asc
          git verify-tag "$tag_ref"
          default_ref="refs/remotes/origin/$DEFAULT_BRANCH"
          git show-ref --verify --quiet "$default_ref"
          git merge-base --is-ancestor HEAD "$default_ref"
          mapfile -t gofiles < <(git ls-files '*.go')
          test -z "$(gofmt -l "${gofiles[@]}")"
          go mod tidy -diff
          go mod verify
          go vet ./...
          go test -race ./...
          CGO_ENABLED=0 go build -trimpath -o /tmp/burnban .
      - name: Vulnerability preflight
        env:
          GOBIN: ${{ runner.temp }}/tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "${GOBIN}/govulncheck" ./...
      - name: Check GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: check
      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - name: Build unpublished tagged release candidate
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          # Build the actual tagged version without creating a GitHub release.
          # These exact bytes are carried through every candidate gate and are
          # later attested and published; the publish job never rebuilds them.
          args: release --skip=publish --clean
      - name: Inspect unpublished release payload
        shell: bash
        run: |
          archive_listing=$(mktemp)
          trap 'rm -f "$archive_listing"' EXIT
          for os in linux darwin; do
            for arch in amd64 arm64; do
              archive="dist/burnban_${os}_${arch}.tar.gz"
              test -f "$archive"
              tar -tzf "$archive" >"$archive_listing"
              grep -Eq '(^|/)burnban$' "$archive_listing"
              grep -Eq '(^|/)LICENSE$' "$archive_listing"
              grep -Eq '(^|/)DATA_AND_PRIVACY.md$' "$archive_listing"
              grep -Eq '(^|/)EXTERNAL_POLICY.md$' "$archive_listing"
              grep -Eq '(^|/)SOURCE_ADAPTERS.md$' "$archive_listing"
              grep -Eq '(^|/)POLICY_ENGINE.md$' "$archive_listing"
              grep -Eq '(^|/)DOWNSHIFT_ROUTING.md$' "$archive_listing"
              grep -Eq '(^|/)SIGNED_IDENTITY.md$' "$archive_listing"
              grep -Eq '(^|/)RECONCILIATION.md$' "$archive_listing"
              grep -Eq '(^|/)TELEMETRY.md$' "$archive_listing"
              grep -Eq '(^|/)OPTIMIZATION.md$' "$archive_listing"
              grep -Eq '(^|/)SECURITY.md$' "$archive_listing"
              grep -Eq '(^|/)THIRD_PARTY_NOTICES.md$' "$archive_listing"
              grep -Eq '(^|/)docs/dashboard.png$' "$archive_listing"
              grep -Eq '(^|/)third_party_licenses/.+/LICENSE' "$archive_listing"
            done
          done
          for arch in amd64 arm64; do
            test -f "dist/burnban_windows_${arch}.zip"
          done
          test -f dist/checksums.txt
          compgen -G 'dist/*.sbom.spdx.json' >/dev/null
          (cd dist && sha256sum --check checksums.txt)
      - name: Upload unpublished tagged candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate
          retention-days: 5
          if-no-files-found: error
          path: |
            dist/burnban_*.tar.gz
            dist/burnban_*.zip
            dist/checksums.txt
            dist/*.sbom.spdx.json

  signed-linux-packages:
    if: github.repository == 'burnban/burnban'
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5.0.5
      - name: Revalidate canonical signed source
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          tag_ref="refs/tags/$GITHUB_REF_NAME"
          test "$(git cat-file -t "$tag_ref")" = tag
          test "$(git rev-parse "$tag_ref^{commit}")" = "$(git rev-parse HEAD)"
          default_ref="refs/remotes/origin/$DEFAULT_BRANCH"
          git show-ref --verify --quiet "$default_ref"
          git merge-base --is-ancestor HEAD "$default_ref"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install repository tooling
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y apt-utils createrepo-c dpkg-dev rpm
      - name: Materialize and validate protected signing identity
        id: signing
        shell: bash
        env:
          PRIVATE_KEY_B64: ${{ secrets.BURNBAN_RELEASE_GPG_PRIVATE_KEY_B64 }}
          EXPECTED_FINGERPRINT: ${{ secrets.BURNBAN_RELEASE_GPG_FINGERPRINT }}
        run: |
          set -euo pipefail
          test -n "$PRIVATE_KEY_B64"
          fingerprint=${EXPECTED_FINGERPRINT//[[:space:]]/}
          fingerprint=${fingerprint^^}
          [[ "$fingerprint" =~ ^[0-9A-F]{40,64}$ ]]
          key_file="$RUNNER_TEMP/burnban-release-private-key.asc"
          umask 077
          printf '%s' "$PRIVATE_KEY_B64" | base64 --decode >"$key_file"
          actual=$(gpg --batch --show-keys --with-colons "$key_file" | awk -F: '$1=="fpr" {print toupper($10); exit}')
          test "$actual" = "$fingerprint"
          echo "key_file=$key_file" >>"$GITHUB_OUTPUT"
          echo "fingerprint=$fingerprint" >>"$GITHUB_OUTPUT"
      - name: Build signed deb and rpm packages
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --skip=publish --clean --config .goreleaser-packages.yaml
        env:
          BURNBAN_RELEASE_GPG_KEY_FILE: ${{ steps.signing.outputs.key_file }}
          NFPM_PASSPHRASE: ${{ secrets.BURNBAN_RELEASE_GPG_PASSPHRASE }}
      - name: Verify package signatures and build signed repositories
        shell: bash
        env:
          BURNBAN_RELEASE_GPG_KEY_FILE: ${{ steps.signing.outputs.key_file }}
          BURNBAN_RELEASE_GPG_FINGERPRINT: ${{ steps.signing.outputs.fingerprint }}
          BURNBAN_RELEASE_GPG_PASSPHRASE: ${{ secrets.BURNBAN_RELEASE_GPG_PASSPHRASE }}
          BURNBAN_RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export SOURCE_DATE_EPOCH
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct "$GITHUB_SHA")
          (cd package-dist && sha256sum --check linux-package-checksums.txt)
          scripts/build_signed_linux_repositories.sh \
            package-dist package-dist/repositories package-dist/burnban-linux-repositories.tar.gz
          rm -rf package-dist/repositories
          (
            cd package-dist
            sha256sum burnban_*.deb burnban_*.rpm \
              burnban-linux-repositories.tar.gz burnban-release-signing-key.asc \
              | LC_ALL=C sort -k2,2 >signed-linux-checksums.txt
            sha256sum --check signed-linux-checksums.txt
          )
      - name: Upload exact signed package bytes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-linux-packages
          retention-days: 5
          if-no-files-found: error
          path: |
            package-dist/burnban_*.deb
            package-dist/burnban_*.rpm
            package-dist/burnban-linux-repositories.tar.gz
            package-dist/burnban-release-signing-key.asc
            package-dist/signed-linux-checksums.txt
      - name: Remove private key material
        if: always()
        shell: bash
        run: rm -f -- "$RUNNER_TEMP/burnban-release-private-key.asc"

  installer:
    needs: preflight
    name: installer candidate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release
      - if: runner.os != 'Windows'
        shell: bash
        run: BURNBAN_RELEASE_DIR="$PWD/release" bash scripts/smoke_install.sh
      - if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:BURNBAN_RELEASE_DIR = (Resolve-Path release).Path
          ./scripts/smoke_install.ps1

  container:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build and inspect candidate container
        shell: bash
        run: |
          docker build --check .
          docker build \
            --build-arg VERSION="$GITHUB_REF_NAME" \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t burnban:release-candidate .
          test "$(docker image inspect burnban:release-candidate --format '{{.Config.User}}')" = "65532:65532"
          cid=$(docker create burnban:release-candidate)
          container_listing=$(mktemp)
          trap 'rm -f "$container_listing"; docker rm -fv "$cid" burnban-release-candidate >/dev/null 2>&1 || true' EXIT
          docker export "$cid" | tar -tf - >"$container_listing"
          grep -q '^licenses/burnban/THIRD_PARTY_NOTICES.md$' "$container_listing"
          docker rm -v "$cid"
          cid=
      - name: Run candidate container
        shell: bash
        run: |
          token=burnban-release-token-1234567890
          docker run -d --name burnban-release-candidate \
            -e BURNBAN_TOKEN="$token" \
            -p 127.0.0.1:44141:4141 \
            burnban:release-candidate serve --host 0.0.0.0 --allow-insecure-http
          trap 'docker logs burnban-release-candidate || true; docker rm -fv burnban-release-candidate >/dev/null 2>&1 || true' EXIT
          for _ in {1..30}; do
            if curl -fsS -H "x-burnban-token: $token" http://127.0.0.1:44141/health | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  browser-accessibility:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: release
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: qa/browser/package-lock.json
      - name: Install pinned browser QA dependencies
        run: |
          npm ci --prefix qa/browser --ignore-scripts --no-audit --no-fund
          npm audit --prefix qa/browser --audit-level=high --omit=optional
          qa/browser/node_modules/.bin/playwright install --with-deps chromium firefox webkit
      - name: Run isolated browser and accessibility gate
        shell: bash
        env:
          BURNBAN_BROWSER_BASE_URL: http://127.0.0.1:44143
          BURNBAN_TEAM_BASE_URL: http://127.0.0.1:44144
          BURNBAN_TEAM_TEST_TOKEN: burnban-browser-test-token-123456
          BURNBAN_ANTHROPIC_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_OPENAI_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_XAI_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_GEMINI_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_OPENROUTER_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_GROQ_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_MISTRAL_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_DEEPSEEK_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_OLLAMA_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_VLLM_UPSTREAM: http://127.0.0.1:44991
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/home"
          tar -xzf release/burnban_linux_amd64.tar.gz -C "$tmp" burnban
          HOME="$tmp/home" "$tmp/burnban" demo --no-open --port 44143 --db "$tmp/demo.db" >"$tmp/demo.log" 2>&1 &
          demo_pid=$!
          BURNBAN_TOKEN="$BURNBAN_TEAM_TEST_TOKEN" HOME="$tmp/home" \
            "$tmp/burnban" serve --port 44144 --public-url https://team.invalid \
            --db "$tmp/team.db" >"$tmp/team.log" 2>&1 &
          team_pid=$!
          cleanup() {
            rc=$?
            kill "$demo_pid" "$team_pid" >/dev/null 2>&1 || true
            wait "$demo_pid" "$team_pid" >/dev/null 2>&1 || true
            if [[ $rc -ne 0 ]]; then cat "$tmp/demo.log" "$tmp/team.log"; fi
            rm -rf "$tmp"
            exit "$rc"
          }
          trap cleanup EXIT
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:44143/health >/dev/null 2>&1; then break; fi
            if ! kill -0 "$demo_pid" >/dev/null 2>&1; then cat "$tmp/demo.log"; exit 1; fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:44143/health | grep -q '"ok":true'
          for _ in {1..60}; do
            if curl -fsS -H "x-burnban-token: $BURNBAN_TEAM_TEST_TOKEN" http://127.0.0.1:44144/health >/dev/null 2>&1; then break; fi
            if ! kill -0 "$team_pid" >/dev/null 2>&1; then cat "$tmp/team.log"; exit 1; fi
            sleep 0.25
          done
          curl -fsS -H "x-burnban-token: $BURNBAN_TEAM_TEST_TOKEN" http://127.0.0.1:44144/health | grep -q '"ok":true'
          npm --prefix qa/browser test
          test ! -e "$tmp/home/.burnban/burnban.db"
      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-browser-qa-traces
          if-no-files-found: ignore
          retention-days: 5
          path: qa/browser/test-results

  publish:
    # Tags are mirrored to private backup repositories, but only the canonical
    # public repository may create releases or provenance attestations.
    if: github.repository == 'burnban/burnban'
    needs: [installer, container, browser-accessibility, signed-linux-packages]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-linux-packages
          path: signed-linux
      - name: Verify carried candidate before attestation
        shell: bash
        run: (cd dist && sha256sum --check checksums.txt)
      - name: Merge verified signed packages into the exact candidate
        shell: bash
        run: |
          set -euo pipefail
          (cd signed-linux && sha256sum --check signed-linux-checksums.txt)
          while read -r expected filename; do
            [[ "$expected" =~ ^[0-9a-f]{64}$ ]]
            case "$filename" in
              ""|*/*|*..*) echo "unsafe signed asset name: $filename" >&2; exit 1 ;;
            esac
            test -f "signed-linux/$filename"
            test ! -e "dist/$filename"
            cp "signed-linux/$filename" "dist/$filename"
            printf '%s  %s\n' "$expected" "$filename" >>dist/checksums.txt
          done <signed-linux/signed-linux-checksums.txt
          LC_ALL=C sort -k2,2 -o dist/checksums.txt dist/checksums.txt
          (cd dist && sha256sum --check checksums.txt)
      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
      - name: Attest checksum manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/checksums.txt
      - name: Stage, verify, and publish exact candidate bytes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag=$GITHUB_REF_NAME
          release_flags=(--verify-tag --draft --generate-notes --title "Burnban $tag")
          publish_flags=(--draft=false)
          case "$tag" in
            *-*)
              release_flags+=(--prerelease)
              publish_flags+=(--prerelease --latest=false)
              ;;
            *)
              publish_flags+=(--prerelease=false --latest)
              ;;
          esac

          # The release remains private while assets are uploaded and checked.
          # A failed upload, digest check, or attestation leaves at most a draft.
          assets=(dist/checksums.txt)
          while read -r expected filename; do
            [[ "$expected" =~ ^[0-9a-f]{64}$ ]]
            case "$filename" in
              ""|*/*|*..*) echo "unsafe release asset name: $filename" >&2; exit 1 ;;
            esac
            test -f "dist/$filename"
            assets+=("dist/$filename")
          done < dist/checksums.txt
          test "${#assets[@]}" -gt 1

          release_is_draft=
          if release_is_draft=$(gh release view "$tag" --json isDraft --jq .isDraft 2>/dev/null); then
            case "$release_is_draft" in
              true|false) ;;
              *) echo "unexpected release state for $tag: $release_is_draft" >&2; exit 1 ;;
            esac
            echo "Found an existing release for $tag; it must match this candidate exactly."
          else
            gh release create "$tag" "${assets[@]}" "${release_flags[@]}"
            release_is_draft=true
          fi
          verify_dir=$(mktemp -d)
          trap 'rm -rf "$verify_dir"' EXIT
          gh release download "$tag" --dir "$verify_dir"
          if ! test "$(find "$verify_dir" -type f | wc -l)" -eq "${#assets[@]}" ||
             ! cmp dist/checksums.txt "$verify_dir/checksums.txt" ||
             ! (cd "$verify_dir" && sha256sum --check checksums.txt); then
            echo "Existing release assets do not exactly match the gated candidate." >&2
            if [ "$release_is_draft" = true ]; then
              echo "Delete the private draft for $tag after review, then rerun the workflow." >&2
            else
              echo "The public release differs; stop and follow the release incident process." >&2
            fi
            exit 1
          fi

          # Publishing is the final mutating step, after exact-byte QA,
          # attestations, draft upload, and authenticated hash verification.
          if [ "$release_is_draft" = true ]; then
            gh release edit "$tag" "${publish_flags[@]}"
          else
            echo "Release $tag is already public and its assets match exactly; continuing verification."
          fi

  anonymous-install-verify:
    needs: publish
    # The final publish API call may succeed before the client observes its
    # response. Exercise public URLs whenever the publish job was not cancelled.
    if: ${{ github.repository == 'burnban/burnban' && always() && needs.publish.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download, verify, and install published assets anonymously
        shell: bash
        run: |
          set -euo pipefail
          release_dir=$(mktemp -d)
          trap 'rm -rf "$release_dir"' EXIT
          asset_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          for _ in {1..12}; do
            if curl --fail --location --silent --show-error \
              "$asset_base/checksums.txt" -o "$release_dir/checksums.txt"; then
              break
            fi
            sleep 5
          done
          test -s "$release_dir/checksums.txt"
          while read -r expected filename; do
            test -n "$expected"
            case "$filename" in
              ""|*/*|*..*) echo "unsafe release asset name: $filename" >&2; exit 1 ;;
            esac
            curl --fail --location --silent --show-error \
              --retry 8 --retry-all-errors \
              "$asset_base/$filename" -o "$release_dir/$filename"
          done < "$release_dir/checksums.txt"
          (cd "$release_dir" && sha256sum --check checksums.txt)
          BURNBAN_RELEASE_DIR="$release_dir" bash scripts/smoke_install.sh
