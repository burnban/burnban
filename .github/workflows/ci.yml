name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: zgosalvez/github-actions-ensure-sha-pinned-actions@9e9574ef04ea69da568d6249bd69539ccc704e74 # v4.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Formatting
        shell: bash
        run: |
          mapfile -t gofiles < <(git ls-files '*.go')
          unformatted=$(gofmt -l "${gofiles[@]}")
          if [[ -n "$unformatted" ]]; then
            echo "The following files need gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - name: Module integrity
        run: |
          go mod tidy -diff
          go mod verify
      - name: Vet, race tests, and static build
        run: |
          go vet ./...
          go test -race -coverprofile=coverage.out ./...
          CGO_ENABLED=0 go build -trimpath -o /tmp/burnban .
      - name: Install pinned analysis tools
        env:
          GOBIN: ${{ runner.temp }}/tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          go install github.com/google/go-licenses/v2@v2.0.1
          echo "$GOBIN" >> "$GITHUB_PATH"
      - name: Staticcheck and vulnerability scan
        run: |
          staticcheck ./...
          govulncheck ./...
      - name: Workflow and secret-history scan
        run: |
          actionlint
          gitleaks git --redact --no-banner .
      - name: License policy and notice coverage
        env:
          # setup-go installs the requested toolchain directly. Keep go-licenses
          # from switching to a toolchain module, which it can misclassify as a
          # third-party dependency when locating standard-library packages.
          GOTOOLCHAIN: local
        shell: bash
        run: |
          expected_go="go$(awk '$1 == "go" { print $2; exit }' go.mod)"
          test "$(go env GOVERSION)" = "$expected_go"
          go-licenses check ./... --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT,Unlicense
          license_dir=$(mktemp -d)
          trap 'rm -rf "$license_dir"' EXIT
          sh scripts/collect_licenses.sh "$license_dir/licenses"
          while IFS= read -r module; do
            version=$(go list -m -f '{{.Version}}' "$module")
            grep -Fq "| \`$module\` | $version |" THIRD_PARTY_NOTICES.md || {
              echo "THIRD_PARTY_NOTICES.md is missing resolved module $module $version" >&2
              exit 1
            }
          done < <(go list -deps -f '{{with .Module}}{{if not .Main}}{{.Path}}{{end}}{{end}}' . | sed '/^$/d' | sort -u)

  release-snapshot:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install pinned Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean
      - name: Inspect release payload
        shell: bash
        run: |
          archive_listing=$(mktemp)
          trap 'rm -f "$archive_listing"' EXIT
          for os in linux darwin; do
            for arch in amd64 arm64; do
              archive="dist/burnban_${os}_${arch}.tar.gz"
              test -f "$archive"
              tar -tzf "$archive" >"$archive_listing"
              grep -Eq '(^|/)burnban$' "$archive_listing"
              grep -Eq '(^|/)LICENSE$' "$archive_listing"
              grep -Eq '(^|/)DATA_AND_PRIVACY.md$' "$archive_listing"
              grep -Eq '(^|/)EXTERNAL_POLICY.md$' "$archive_listing"
              grep -Eq '(^|/)SOURCE_ADAPTERS.md$' "$archive_listing"
              grep -Eq '(^|/)POLICY_ENGINE.md$' "$archive_listing"
              grep -Eq '(^|/)DOWNSHIFT_ROUTING.md$' "$archive_listing"
              grep -Eq '(^|/)SIGNED_IDENTITY.md$' "$archive_listing"
              grep -Eq '(^|/)RECONCILIATION.md$' "$archive_listing"
              grep -Eq '(^|/)TELEMETRY.md$' "$archive_listing"
              grep -Eq '(^|/)OPTIMIZATION.md$' "$archive_listing"
              grep -Eq '(^|/)SECURITY.md$' "$archive_listing"
              grep -Eq '(^|/)THIRD_PARTY_NOTICES.md$' "$archive_listing"
              grep -Eq '(^|/)docs/dashboard.png$' "$archive_listing"
              grep -Eq '(^|/)third_party_licenses/.+/LICENSE' "$archive_listing"
            done
          done
          for arch in amd64 arm64; do
            test -f "dist/burnban_windows_${arch}.zip"
          done
          test -f dist/checksums.txt
          compgen -G 'dist/*.sbom.spdx.json' >/dev/null
          (cd dist && sha256sum --check checksums.txt)
      - name: Upload release snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-snapshot
          retention-days: 5
          if-no-files-found: error
          path: |
            dist/burnban_*.tar.gz
            dist/burnban_*.zip
            dist/checksums.txt
            dist/*.sbom.spdx.json

  linux-package-snapshot:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Check Linux package configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: check --config .goreleaser-packages.yaml
      - name: Build unsigned reproducible package snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --config .goreleaser-packages.yaml
      - name: Install pinned GoReleaser for byte reproduction
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          install-only: true
      - name: Inspect and reproduce package bytes
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y rpm
          work=$(mktemp -d)
          trap 'rm -rf "$work"' EXIT
          test "$(find package-dist -maxdepth 1 -name 'burnban_*.deb' | wc -l)" -eq 2
          test "$(find package-dist -maxdepth 1 -name 'burnban_*.rpm' | wc -l)" -eq 2
          docs=(
            LICENSE README.md DATA_AND_PRIVACY.md SECURITY.md SOURCE_ADAPTERS.md
            POLICY_ENGINE.md DOWNSHIFT_ROUTING.md SIGNED_IDENTITY.md
            RECONCILIATION.md TELEMETRY.md OPTIMIZATION.md LINUX_PACKAGES.md
            THIRD_PARTY_NOTICES.md
          )
          for package in package-dist/burnban_*.deb; do
            dpkg-deb --info "$package" >/dev/null
            listing="$work/$(basename "$package").contents"
            dpkg-deb --contents "$package" >"$listing"
            grep -Eq 'usr/bin/burnban$' "$listing"
            for doc in "${docs[@]}"; do
              grep -Eq "usr/share/doc/burnban/${doc}$" "$listing"
            done
            grep -Eq 'usr/share/doc/burnban/third_party_licenses/.+/LICENSE' "$listing"
            members="$work/$(basename "$package").members"
            ar t "$package" >"$members"
            if grep -qx _gpgorigin "$members"; then
              echo "ordinary CI unexpectedly created a signed Debian package" >&2
              exit 1
            fi
          done
          for package in package-dist/burnban_*.rpm; do
            rpm -qp --info "$package" >/dev/null
            listing="$work/$(basename "$package").contents"
            rpm -qp --list "$package" >"$listing"
            grep -qx '/usr/bin/burnban' "$listing"
            for doc in "${docs[@]}"; do
              grep -qx "/usr/share/doc/burnban/${doc}" "$listing"
            done
            grep -Eq '/usr/share/doc/burnban/third_party_licenses/.+/LICENSE' "$listing"
            test "$(rpm -qp --queryformat '%{RSAHEADER}' "$package")" = "(none)"
          done
          (cd package-dist && sha256sum --check linux-package-checksums.txt)

          expect_path_rejection() {
            expected=$1
            shift
            rejection=$(mktemp)
            if scripts/build_signed_linux_repositories.sh "$@" >"$rejection" 2>&1; then
              echo "repository builder accepted unsafe paths: $*" >&2
              rm -f "$rejection"
              exit 1
            fi
            if ! grep -Fq "$expected" "$rejection"; then
              echo "repository builder failed for the wrong reason: $*" >&2
              cat "$rejection" >&2
              rm -f "$rejection"
              exit 1
            fi
            rm -f "$rejection"
          }
          expect_path_rejection "must be distinct direct children" \
            package-dist package-dist package-dist/unsafe.tar.gz
          ln -s "$RUNNER_TEMP" package-dist/unsafe-repositories
          expect_path_rejection "paths are unsafe, overlapping, or symlinked" \
            package-dist package-dist/unsafe-repositories package-dist/unsafe.tar.gz
          rm package-dist/unsafe-repositories
          mkdir package-dist/unsafe-repositories
          expect_path_rejection "must be distinct direct children" \
            package-dist package-dist/unsafe-repositories \
            package-dist/unsafe-repositories/archive.tar.gz
          rm -rf package-dist/unsafe-repositories
          expect_path_rejection "paths are unsafe, overlapping, or symlinked" \
            package-dist package-dist/burnban-release-signing-key.asc \
            package-dist/unsafe.tar.gz
          expect_path_rejection "must have a .tar.gz filename" \
            package-dist package-dist/unsafe-repositories \
            package-dist/burnban-release-signing-key.asc
          first="$work/first"
          mkdir "$first"
          cp package-dist/burnban_*.deb package-dist/burnban_*.rpm package-dist/linux-package-checksums.txt "$first/"
          goreleaser release --snapshot --clean --config .goreleaser-packages.yaml
          cmp "$first/linux-package-checksums.txt" package-dist/linux-package-checksums.txt
          for original in "$first"/burnban_*; do
            cmp "$original" "package-dist/$(basename "$original")"
          done
      - name: Upload unsigned package snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-package-snapshot
          retention-days: 5
          if-no-files-found: error
          path: |
            package-dist/burnban_*.deb
            package-dist/burnban_*.rpm
            package-dist/linux-package-checksums.txt

  installer:
    needs: release-snapshot
    name: installer artifact (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-snapshot
          path: release
      - if: runner.os != 'Windows'
        shell: bash
        run: BURNBAN_RELEASE_DIR="$PWD/release" bash scripts/smoke_install.sh
      - if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:BURNBAN_RELEASE_DIR = (Resolve-Path release).Path
          ./scripts/smoke_install.ps1

  container:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dockerfile checks and build
        shell: bash
        run: |
          docker build --check .
          docker build \
            --build-arg VERSION=ci \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t burnban:ci .
          test "$(docker image inspect burnban:ci --format '{{.Config.User}}')" = "65532:65532"
          cid=$(docker create burnban:ci)
          container_listing=$(mktemp)
          trap 'rm -f "$container_listing"; docker rm -fv "$cid" burnban-ci >/dev/null 2>&1 || true' EXIT
          docker export "$cid" | tar -tf - >"$container_listing"
          grep -q '^licenses/burnban/THIRD_PARTY_NOTICES.md$' "$container_listing"
          docker rm -v "$cid"
          cid=
      - name: Container runtime smoke
        shell: bash
        run: |
          token=burnban-ci-token-1234567890
          docker run -d --name burnban-ci \
            -e BURNBAN_TOKEN="$token" \
            -p 127.0.0.1:44141:4141 \
            burnban:ci serve --host 0.0.0.0 --allow-insecure-http
          trap 'docker logs burnban-ci || true; docker rm -fv burnban-ci >/dev/null 2>&1 || true' EXIT
          for _ in {1..30}; do
            if curl -fsS -H "x-burnban-token: $token" http://127.0.0.1:44141/health | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  browser-accessibility:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: qa/browser/package-lock.json
      - name: Install pinned browser QA dependencies
        run: |
          npm ci --prefix qa/browser --ignore-scripts --no-audit --no-fund
          npm audit --prefix qa/browser --audit-level=high --omit=optional
          qa/browser/node_modules/.bin/playwright install --with-deps chromium firefox webkit
      - name: Responsive and accessibility smoke
        shell: bash
        env:
          BURNBAN_BROWSER_BASE_URL: http://127.0.0.1:44143
          BURNBAN_TEAM_BASE_URL: http://127.0.0.1:44144
          BURNBAN_TEAM_TEST_TOKEN: burnban-browser-test-token-123456
          BURNBAN_ANTHROPIC_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_OPENAI_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_XAI_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_GEMINI_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_OPENROUTER_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_GROQ_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_MISTRAL_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_DEEPSEEK_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_OLLAMA_UPSTREAM: http://127.0.0.1:44991
          BURNBAN_VLLM_UPSTREAM: http://127.0.0.1:44991
        run: |
          tmp=$(mktemp -d)
          mkdir -p "$tmp/home"
          CGO_ENABLED=0 go build -trimpath -o "$tmp/burnban" .
          HOME="$tmp/home" "$tmp/burnban" demo --no-open --port 44143 --db "$tmp/demo.db" >"$tmp/demo.log" 2>&1 &
          demo_pid=$!
          BURNBAN_TOKEN="$BURNBAN_TEAM_TEST_TOKEN" HOME="$tmp/home" \
            "$tmp/burnban" serve --port 44144 --public-url https://team.invalid \
            --db "$tmp/team.db" >"$tmp/team.log" 2>&1 &
          team_pid=$!
          cleanup() {
            status=$?
            kill "$demo_pid" "$team_pid" >/dev/null 2>&1 || true
            wait "$demo_pid" "$team_pid" >/dev/null 2>&1 || true
            if [[ $status -ne 0 ]]; then cat "$tmp/demo.log" "$tmp/team.log"; fi
            rm -rf "$tmp"
            exit "$status"
          }
          trap cleanup EXIT
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:44143/health >/dev/null 2>&1; then break; fi
            if ! kill -0 "$demo_pid" >/dev/null 2>&1; then cat "$tmp/demo.log"; exit 1; fi
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:44143/health | grep -q '"ok":true'
          for _ in {1..60}; do
            if curl -fsS -H "x-burnban-token: $BURNBAN_TEAM_TEST_TOKEN" http://127.0.0.1:44144/health >/dev/null 2>&1; then break; fi
            if ! kill -0 "$team_pid" >/dev/null 2>&1; then cat "$tmp/team.log"; exit 1; fi
            sleep 0.25
          done
          curl -fsS -H "x-burnban-token: $BURNBAN_TEAM_TEST_TOKEN" http://127.0.0.1:44144/health | grep -q '"ok":true'
          npm --prefix qa/browser test
          test ! -e "$tmp/home/.burnban/burnban.db"
      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-qa-traces
          if-no-files-found: ignore
          retention-days: 5
          path: qa/browser/test-results
